<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Categories | LustreView Blinds Admin</title>
  </head>
  <body
    x-data="{ page: 'categories', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Categories`}">
              <include src="./partials/breadcrumb.html" />
            </div>
            <!-- Breadcrumb End -->

            <div class="flex flex-col gap-6">
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div>
                  <h2 class="text-xl font-semibold text-gray-800 dark:text-white/90">Categories</h2>
                  <p class="text-sm text-gray-500 dark:text-gray-400">
                    Organize products by tone, room, and visibility.
                  </p>
                </div>
                <button class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">
                  Add Category
                </button>
              </div>

              <div class="grid gap-6 xl:grid-cols-3">
                <div class="space-y-6 xl:col-span-2">
                  <div class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]">
                    <div class="px-5 py-4 sm:px-6 sm:py-5">
                      <h3 class="text-base font-medium text-gray-800 dark:text-white/90">
                        Category List
                      </h3>
                    </div>
                    <div class="border-t border-gray-100 p-5 dark:border-gray-800 sm:p-6">
                      <div class="overflow-x-auto">
                        <table class="w-full min-w-[560px] text-sm">
                          <thead>
                            <tr class="text-left text-gray-500 dark:text-gray-400">
                              <th class="pb-3 font-medium">Category</th>
                              <th class="pb-3 font-medium">Tag</th>
                              <th class="pb-3 font-medium">Products</th>
                              <th class="pb-3 font-medium">Status</th>
                              <th class="pb-3 font-medium">Actions</th>
                            </tr>
                          </thead>
                          <tbody class="text-gray-700 dark:text-gray-200">
                            <tr class="border-t border-gray-100 dark:border-gray-800">
                              <td class="py-4">Beige / Taupe</td>
                              <td class="py-4">warm</td>
                              <td class="py-4">11</td>
                              <td class="py-4">
                                <span class="inline-flex items-center rounded-full bg-brand-50 px-2.5 py-0.5 text-xs font-medium text-brand-500 dark:bg-brand-500/10">Featured</span>
                              </td>
                              <td class="py-4">
                                <button class="rounded-md border border-gray-200 px-3 py-1 text-xs font-medium hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-white/5">Edit</button>
                              </td>
                            </tr>
                            <tr class="border-t border-gray-100 dark:border-gray-800">
                              <td class="py-4">Gray / Charcoal</td>
                              <td class="py-4">cool</td>
                              <td class="py-4">9</td>
                              <td class="py-4">
                                <span class="inline-flex items-center rounded-full bg-gray-100 px-2.5 py-0.5 text-xs font-medium text-gray-600 dark:bg-white/10 dark:text-gray-300">Visible</span>
                              </td>
                              <td class="py-4">
                                <button class="rounded-md border border-gray-200 px-3 py-1 text-xs font-medium hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-white/5">Edit</button>
                              </td>
                            </tr>
                            <tr class="border-t border-gray-100 dark:border-gray-800">
                              <td class="py-4">Cream / Ivory</td>
                              <td class="py-4">neutral</td>
                              <td class="py-4">7</td>
                              <td class="py-4">
                                <span class="inline-flex items-center rounded-full bg-amber-50 px-2.5 py-0.5 text-xs font-medium text-amber-700 dark:bg-amber-500/10">Draft</span>
                              </td>
                              <td class="py-4">
                                <button class="rounded-md border border-gray-200 px-3 py-1 text-xs font-medium hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-white/5">Edit</button>
                              </td>
                            </tr>
                            <tr class="border-t border-gray-100 dark:border-gray-800">
                              <td class="py-4">Blackout</td>
                              <td class="py-4">privacy</td>
                              <td class="py-4">12</td>
                              <td class="py-4">
                                <span class="inline-flex items-center rounded-full bg-emerald-50 px-2.5 py-0.5 text-xs font-medium text-emerald-600 dark:bg-emerald-500/10">Live</span>
                              </td>
                              <td class="py-4">
                                <button class="rounded-md border border-gray-200 px-3 py-1 text-xs font-medium hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-white/5">Edit</button>
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="space-y-6">
                  <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] sm:p-6">
                    <h3 class="text-base font-medium text-gray-800 dark:text-white/90">Add Category</h3>
                    <form class="mt-5 space-y-4">
                      <div>
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Category name</label>
                        <input class="mt-2 w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-800 dark:bg-transparent dark:text-gray-200" placeholder="Beige / Taupe" />
                      </div>
                      <div>
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Tag</label>
                        <input class="mt-2 w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-800 dark:bg-transparent dark:text-gray-200" placeholder="warm" />
                      </div>
                      <div>
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Status</label>
                        <select class="mt-2 w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-800 dark:bg-transparent dark:text-gray-200">
                          <option>Live</option>
                          <option>Draft</option>
                          <option>Hidden</option>
                        </select>
                      </div>
                      <button class="w-full rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-600">Save Category</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
  </body>
</html>
