<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Collections | Luxe Drapes Admin</title>
  </head>
  <body
    x-data="{ page: 'products', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <!-- Small Device Overlay Start -->
        <include src="./partials/overlay.html" />
        <!-- Small Device Overlay End -->

        <!-- ===== Header Start ===== -->
        <include src="./partials/header.html" />
        <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Collections`}">
              <include src="./partials/breadcrumb.html" />
            </div>
            <!-- Breadcrumb End -->

            <div class="flex flex-col gap-6">
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div>
                  <h2 class="text-xl font-semibold text-gray-800 dark:text-white/90">Collections</h2>
                  <p class="text-sm text-gray-500 dark:text-gray-400">
                    Manage zebra blinds collections shown on your website.
                  </p>
                </div>
                <div class="flex flex-wrap gap-3">
                  <button id="add-collection-btn" class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2 text-sm font-medium text-white shadow-theme-xs hover:bg-brand-600">
                    Add Collection
                  </button>
                  <button id="export-collection-btn" class="inline-flex items-center gap-2 rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-theme-xs hover:bg-gray-50 dark:border-gray-800 dark:bg-white/[0.03] dark:text-gray-200 dark:hover:bg-white/5">
                    Export
                  </button>
                </div>
              </div>

              <div class="grid gap-6 xl:grid-cols-3">
                <div class="space-y-6 xl:col-span-2">
                  <div class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]">
                    <div class="px-5 py-4 sm:px-6 sm:py-5">
                      <h3 class="text-base font-medium text-gray-800 dark:text-white/90">
                        Active Collections
                      </h3>
                    </div>
                    <div class="border-t border-gray-100 p-5 dark:border-gray-800 sm:p-6">
                      <div class="overflow-x-auto">
                        <table class="w-full min-w-[720px] text-sm">
                          <thead>
                            <tr class="text-left text-gray-500 dark:text-gray-400">
                              <th class="pb-3 font-medium">Image</th>
                              <th class="pb-3 font-medium">Name</th>
                              <th class="pb-3 font-medium">Category</th>
                              <th class="pb-3 font-medium">Price</th>
                              <th class="pb-3 font-medium">Short Description</th>
                              <th class="pb-3 font-medium">Actions</th>
                            </tr>
                          </thead>
                          <tbody id="collections-table" class="text-gray-700 dark:text-gray-200"></tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="space-y-6">
                  <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] sm:p-6">
                    <div class="flex items-center justify-between gap-3">
                      <h3 class="text-base font-medium text-gray-800 dark:text-white/90">Create Collection</h3>
                      <button id="reset-collection-btn" class="text-xs font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400">
                        Reset
                      </button>
                    </div>
                    <form id="collection-form" class="mt-5 space-y-4">
                      <input type="hidden" id="collection-id" />
                      <div>
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Collection name</label>
                        <input id="collection-name" class="mt-2 w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-800 dark:bg-transparent dark:text-gray-200" placeholder="Zebra Light Filtering" required />
                      </div>
                      <div>
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Category label</label>
                        <input id="collection-label" class="mt-2 w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-800 dark:bg-transparent dark:text-gray-200" placeholder="Beige / Taupe - Light Filtering" required />
                      </div>
                      <div>
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Price (IRR)</label>
                        <input id="collection-price" type="number" min="0" class="mt-2 w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-800 dark:bg-transparent dark:text-gray-200" placeholder="2850000" required />
                      </div>
                      <div>
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Image URL</label>
                        <input id="collection-image" class="mt-2 w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-800 dark:bg-transparent dark:text-gray-200" placeholder="https://" required />
                      </div>
                      <div>
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Short description</label>
                        <textarea id="collection-description" rows="3" class="mt-2 w-full rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 dark:border-gray-800 dark:bg-transparent dark:text-gray-200" placeholder="Short summary for the card" required></textarea>
                      </div>
                      <button id="collection-submit" class="w-full rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-600">Save Collection</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->

        <script>
      const API_BASE = (() => {
        const { protocol, hostname, port, origin } = window.location;
        if (protocol === 'file:') {
          return 'http://localhost:3001/api/collections';
        }
        if (hostname === 'localhost' && port && port !== '3001') {
          return 'http://localhost:3001/api/collections';
        }
        return `${origin}/api/collections`;
      })();

      const form = document.getElementById('collection-form');
      const tableBody = document.getElementById('collections-table');
      const addButton = document.getElementById('add-collection-btn');
      const resetButton = document.getElementById('reset-collection-btn');
      const exportButton = document.getElementById('export-collection-btn');

      const fields = {
        id: document.getElementById('collection-id'),
        name: document.getElementById('collection-name'),
        label: document.getElementById('collection-label'),
        price: document.getElementById('collection-price'),
        image: document.getElementById('collection-image'),
        description: document.getElementById('collection-description')
      };

      const statusStyles = {
        Live: 'bg-emerald-50 text-emerald-600 dark:bg-emerald-500/10',
        Draft: 'bg-amber-50 text-amber-700 dark:bg-amber-500/10',
        Hidden: 'bg-gray-100 text-gray-600 dark:bg-white/10 dark:text-gray-300'
      };

      const formatDate = (value) => {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '—';
        return date.toLocaleDateString('en-US', {
          month: 'short',
          day: '2-digit',
          year: 'numeric'
        });
      };

      const formatPrice = (value) => Number(value || 0).toLocaleString('en-US');

      const resetForm = () => {
        form.reset();
        fields.id.value = '';
        document.getElementById('collection-submit').textContent = 'Save Collection';
      };

      const fillForm = (collection) => {
        fields.id.value = collection.id;
        fields.name.value = collection.name;
        fields.label.value = collection.label;
        fields.price.value = collection.price;
        fields.image.value = collection.image;
        fields.description.value = collection.description;
        document.getElementById('collection-submit').textContent = 'Update Collection';
      };

      const renderTable = (collections) => {
        tableBody.innerHTML = '';
        collections.forEach((collection) => {
          const row = document.createElement('tr');
          row.className = 'border-t border-gray-100 dark:border-gray-800';
          row.innerHTML = `
            <td class="py-4">
              <img class="h-12 w-16 rounded-lg object-cover" src="${collection.image}" alt="${collection.name}">
            </td>
            <td class="py-4">
              <div class="font-medium text-gray-800 dark:text-white/90">${collection.name}</div>
            </td>
            <td class="py-4">
              <div class="text-xs text-gray-500 dark:text-gray-400">${collection.label}</div>
            </td>
            <td class="py-4">${formatPrice(collection.price)} IRR</td>
            <td class="py-4">
              <div class="text-xs text-gray-500 dark:text-gray-400">${collection.description}</div>
            </td>
            <td class="py-4">
              <div class="flex flex-wrap gap-2">
                <button data-action="edit" data-id="${collection.id}" class="rounded-md border border-gray-200 px-3 py-1 text-xs font-medium hover:bg-gray-50 dark:border-gray-800 dark:hover:bg-white/5">Edit</button>
                <button data-action="toggle" data-id="${collection.id}" class="rounded-md bg-brand-500 px-3 py-1 text-xs font-medium text-white hover:bg-brand-600">${collection.status === 'Hidden' ? 'Publish' : 'Hide'}</button>
                <button data-action="delete" data-id="${collection.id}" class="rounded-md bg-gray-900 px-3 py-1 text-xs font-medium text-white hover:bg-gray-800">Delete</button>
              </div>
            </td>
          `;
          tableBody.appendChild(row);
        });
      };

      const api = {
        list: async () => {
          const res = await fetch(API_BASE);
          if (!res.ok) throw new Error('Failed to load collections');
          return res.json();
        },
        create: async (payload) => {
          const res = await fetch(API_BASE, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error('Failed to create collection');
          return res.json();
        },
        update: async (payload) => {
          const res = await fetch(`${API_BASE}/${payload.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error('Failed to update collection');
          return res.json();
        },
        remove: async (id) => {
          const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
          if (!res.ok) throw new Error('Failed to delete collection');
        }
      };

      let collections = [];

      const loadCollections = async () => {
        try {
          collections = await api.list();
          renderTable(collections);
        } catch (error) {
          tableBody.innerHTML = '<tr><td class="py-4" colspan="6">Database is not reachable. Start the server first.</td></tr>';
        }
      };

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const now = new Date().toISOString().slice(0, 10);
        const nameValue = fields.name.value.trim();
        const labelValue = fields.label.value.trim();
        const deriveTags = (label, name) =>
          `${label} ${name}`
            .toLowerCase()
            .replace(/[\/\-–—]+/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
        const deriveType = (label) => {
          const value = label.toLowerCase();
          if (value.includes('blackout')) return 'Blackout';
          if (value.includes('light')) return 'Light Filtering';
          if (value.includes('motor')) return 'Motorized';
          return 'Custom';
        };
        const existing = fields.id.value ? collections.find((item) => item.id === fields.id.value) : null;
        const payload = {
          id: fields.id.value || undefined,
          name: nameValue,
          label: labelValue,
          tags: existing?.tags || deriveTags(labelValue, nameValue),
          type: existing?.type || deriveType(labelValue),
          status: existing?.status || 'Live',
          price: Number(fields.price.value),
          popular: existing?.popular ?? 5,
          rating: existing?.rating ?? 4.5,
          badge: existing?.badge || '',
          image: fields.image.value.trim(),
          description: fields.description.value.trim(),
          updatedAt: now
        };

        try {
          if (payload.id) {
            await api.update(payload);
          } else {
            await api.create(payload);
          }
          await loadCollections();
          resetForm();
        } catch (error) {
          alert('Could not save collection. Check server status.');
        }
      });

      tableBody.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const id = button.dataset.id;
        const action = button.dataset.action;
        const target = collections.find((item) => item.id === id);
        if (!target) return;

        if (action === 'edit') {
          fillForm(target);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        if (action === 'toggle') {
          const nextStatus = target.status === 'Hidden' ? 'Live' : 'Hidden';
          try {
            await api.update({ ...target, status: nextStatus, updatedAt: new Date().toISOString().slice(0, 10) });
            await loadCollections();
          } catch (error) {
            alert('Could not update status.');
          }
        }

        if (action === 'delete') {
          if (!confirm('Delete this collection?')) return;
          try {
            await api.remove(id);
            await loadCollections();
          } catch (error) {
            alert('Could not delete collection.');
          }
        }
      });

      addButton.addEventListener('click', () => {
        resetForm();
        fields.name.focus();
      });

      resetButton.addEventListener('click', resetForm);

      exportButton.addEventListener('click', () => {
        const dataStr = JSON.stringify(collections, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = 'luxe-collections.json';
        anchor.click();
        URL.revokeObjectURL(url);
      });

      loadCollections();
    </script>
  </body>
</html>
