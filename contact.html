<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | LustreView Blinds</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-shell { max-width: 1100px; margin: 0 auto; padding: 118px 5% 84px; }
    .contact-hero { display:grid; gap: 14px; max-width: 820px; }
    .contact-kicker { display:inline-flex; width:fit-content; padding:10px 14px; border-radius:999px; background: rgba(201,169,98,0.12); color: var(--primary-dark); font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; }
    .contact-title { margin:0; font-size: clamp(2.2rem, 5vw, 3.6rem); line-height:1.05; }
    .contact-desc { margin:0; color: var(--gray); line-height:1.85; font-size: 18px; }
    .contact-card { margin-top: 26px; background: rgba(255,255,255,0.82); border: 1px solid rgba(17,17,17,0.08); border-radius: 26px; padding: 22px; box-shadow: 0 18px 40px rgba(0,0,0,0.08); display:grid; gap: 14px; max-width: 820px; }
    .contact-row { display:flex; gap: 10px; align-items:center; color: var(--gray); }
    .contact-row i { color: var(--primary-dark); width: 22px; text-align:center; }
    .contact-actions { display:flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
  </style>
</head>
<body data-site-page="contact">
  <div data-site-header></div>
  <script src="site-state.js"></script>
  <script src="site-header.js"></script>

  <main class="contact-shell">
    <section class="contact-hero">
      <span class="contact-kicker">Contact</span>
      <h1 class="contact-title">Talk to the design team</h1>
      <p class="contact-desc">Use checkout for order requests, or contact us directly for a consultation.</p>
    </section>

    <section class="contact-card">
      <div class="contact-row"><i class="fas fa-phone"></i><span>+98 21 1234 5678</span></div>
      <div class="contact-row"><i class="fas fa-envelope"></i><span>hello@lustreviewblinds.ca</span></div>
      <div class="contact-row"><i class="fas fa-map-marker-alt"></i><span>Tehran, Jordan St.</span></div>
      <div class="contact-actions">
        <a class="btn-primary" href="checkout.html">Start a request</a>
        <a class="btn-secondary" href="index.html#contact">Open contact section</a>
      </div>
    </section>
  </main>
</body>
</html>
