<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LustreView Blinds | 3D Virtual Showroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* تنظیمات پایه برای فضای تمام صفحه و بدون اسکرول */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff; font-family: 'Inter', sans-serif; 
            cursor: grab; /* نشانگر موس مخصوص درگ کردن */
        }
        body:active { cursor: grabbing; }
        
        /* لایه رابط کاربری (متون روی صفحه) */
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; 
            padding: 40px; box-sizing: border-box; 
        }
        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 2px; margin: 0; }
        h1 span { color: #C9A962; font-style: italic; }
        .hint { 
            text-align: center; font-size: 14px; letter-spacing: 4px; 
            text-transform: uppercase; color: #888; margin-bottom: 20px; 
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        /* راه‌اندازی صحنه سه‌بعدی */
        .scene { 
            width: 100vw; height: 100vh; 
            perspective: 1000px; /* عمق میدان دوربین */
            display: flex; justify-content: center; align-items: center; 
        }
        
        /* استوانه نگهدارنده کارت‌ها */
        .carousel { 
            width: 350px; height: 500px; 
            position: relative; 
            transform-style: preserve-3d; 
        }
        
        /* استایل کارت‌های محصولات (پنل‌ها) */
        .panel { 
            position: absolute; width: 100%; height: 100%; left: 0; top: 0; 
            background-color: #111; 
            border: 1px solid rgba(201, 169, 98, 0.3); 
            border-radius: 15px; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); 
            /* ایجاد انعکاس (رفلکس) شیشه‌ای در پایین کارت‌ها برای حس لوکس بودن */
            -webkit-box-reflect: below 10px linear-gradient(transparent 60%, rgba(0,0,0,0.5)); 
        }
        
        .panel img { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute; top: 0; left: 0; z-index: 1; 
            opacity: 0.6; transition: opacity 0.6s, transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            filter: grayscale(40%); 
        }
        .panel:hover img { 
            opacity: 1; transform: scale(1.08); filter: grayscale(0%); 
        }
        
        .panel-content { 
            position: relative; z-index: 2; padding: 30px; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); 
            transform: translateY(20px); transition: transform 0.5s; 
        }
        .panel:hover .panel-content { transform: translateY(0); }
        .panel-content h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: #C9A962; margin: 0 0 8px 0; }
        .panel-content p { margin: 0; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>

    <div class="overlay">
        <header>
            <h1>LustreView <span>Blinds</span></h1>
            <div style="font-size: 12px; letter-spacing: 2px; color: #C9A962;">3D VIRTUAL SHOWROOM</div>
        </header>
        <div class="hint">← Drag to Explore →</div>
    </div>

    <div class="scene">
        <div class="carousel" id="carousel">
            </div>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        
        // داده‌های فرضی برای پرده‌ها
        const items = [
            { title: 'Midnight Charcoal', img: 'https://images.unsplash.com/photo-1513694203232-719a280e022f?w=800' },
            { title: 'Royal Amber', img: 'https://images.unsplash.com/photo-1616046229478-9901c5536a45?w=800' },
            { title: 'Nordic Linen', img: 'https://images.unsplash.com/photo-1600565193348-f74a4d160a86?w=800' },
            { title: 'Whisper Sheer', img: 'https://images.unsplash.com/photo-1588854337236-6889d631faa8?w=800' },
            { title: 'Crimson Velvet', img: 'https://images.unsplash.com/photo-1617325247661-675ab4b64ae2?w=800' },
            { title: 'Zebra Smart', img: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=800' }
        ];

        const numPanels = items.length;
        const theta = 360 / numPanels; // زاویه بین هر پنل
        const panelWidth = 350;
        
        // فرمول ریاضی حیاتی: محاسبه شعاع استوانه بر اساس عرض پنل‌ها و تعدادشان
        const radius = Math.round((panelWidth / 2) / Math.tan(Math.PI / numPanels));

        // ساخت و چیدمان پنل‌ها در فضای سه‌بعدی
        items.forEach((item, i) => {
            const panel = document.createElement('div');
            panel.className = 'panel';
            
            // چرخش و هل دادن هر کارت به سمت بیرون برای ساخت شکل استوانه
            const angle = theta * i;
            panel.style.transform = `rotateY(${angle}deg) translateZ(${radius + 60}px)`; 
            
            panel.innerHTML = `
                <img src="${item.img}" alt="${item.title}" draggable="false">
                <div class="panel-content">
                    <h2>${item.title}</h2>
                    <p>Premium Collection</p>
                </div>
            `;
            carousel.appendChild(panel);
        });

        // === منطق چرخش بسیار نرم (Buttery Smooth Drag) با استفاده از فرمول Lerp ===
        let currentX = 0;   // زاویه فعلی
        let targetX = -60;  // زاویه هدف (کمی میچرخد تا انیمیشن ورود داشته باشد)
        let isDragging = false;
        let startX = 0;

        // رویدادهای موس
        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX; // میزان جابجایی موس
            targetX += dx * 0.25;          // حساسیت چرخش
            startX = e.clientX;
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mouseleave', () => { isDragging = false; });

        // رویدادهای لمسی برای موبایل
        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const dx = e.touches[0].clientX - startX;
            targetX += dx * 0.25;
            startX = e.touches[0].clientX;
        });

        window.addEventListener('touchend', () => { isDragging = false; });

        // حلقه انیمیشن که 60 فریم بر ثانیه اجرا می‌شود
        function animate() {
            // فرمول Linear Interpolation (Lerp) برای نرم کردن حرکت
            currentX += (targetX - currentX) * 0.08; 
            
            // اعمال چرخش به کل استوانه و کمی متمایل کردن دوربین رو به پایین (rotateX)
            carousel.style.transform = `translateZ(${-radius - 200}px) rotateX(-4deg) rotateY(${currentX}deg)`;
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
